version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baseball-app-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend/app:/app/app
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////app/data/baseball.db"
      CORS_ORIGINS_STR: "http://localhost:3000,http://localhost:3001"
      DEBUG: "true"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - baseball-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: baseball-app-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      - backend
    networks:
      - baseball-network

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: baseball-app-scraper
    volumes:
      - ./data:/app/data
      - ./scraper:/app/scraper
    environment:
      DATABASE_PATH: "/app/data/baseball.db"
    profiles:
      - scraper
    command: tail -f /dev/null
    networks:
      - baseball-network

networks:
  baseball-network:
    driver: bridge
